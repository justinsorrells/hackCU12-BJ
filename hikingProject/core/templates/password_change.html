{% extends "base.html" %}

{% block title %}Change Password | TrailCircle{% endblock %}

{% block content %}
    <section class="form-split">
        <article class="form-card">
            <span class="eyebrow">Account security</span>
            <h1 class="form-title">Change password</h1>

            <form method="post" class="form-layout">
                {% csrf_token %}
                {% include "partials/form_fields.html" with form=form %}
                <div class="button-row">
                    <button class="btn btn-primary" type="submit">Update password</button>
                    <a class="btn btn-outline" href="{% url 'edit_profile' %}">Cancel</a>
                </div>
            </form>
        </article>

        <aside class="panel">
            <span class="eyebrow eyebrow--warm">Tip</span>
            <h2 class="card-title">Use a unique password.</h2>
        </aside>
    </section>
{% endblock %}
