{% extends "base.html" %}

{% block content %}
<div class="edit-profile-page">
    <div class="edit-profile-card">
        <h1>Change Password</h1>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="form-actions">
                <button type="submit">Update Password</button>
                <a href="{% url 'edit_profile' %}">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
