{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#003135">
    <title>{% block title %}PeakPals{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'core/css/app.css' %}">
    {% block extra_head %}{% endblock %}
</head>

<body class="{% if user.is_authenticated %}has-mobile-nav {% endif %}{% block body_class %}{% endblock %}">
    <div class="app-backdrop"></div>

    {% include "partials/navbar.html" %}

    <main class="page-shell">
        <div class="page-container">
            {% if messages %}
                <div class="message-stack">
                    {% for message in messages %}
                        <div class="message message--{{ message.tags|default:'info' }}">
                            <p>{{ message }}</p>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="{% static 'core/js/app.js' %}" defer></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
