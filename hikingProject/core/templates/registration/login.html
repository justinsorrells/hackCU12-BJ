<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h1>Login</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

    <p>Need an account? <a href="{% url 'register' %}">Sign up</a></p>
</body>
</html>
