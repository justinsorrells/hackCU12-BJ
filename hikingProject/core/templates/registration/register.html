<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
</head>
<body>
    <h1>Create Account</h1>

    <form method="post">
        {% csrf_token %}
	username:
        {{ form.username }}
	<br>
	password:
	{{ form.password1 }}
	<br>
	re-enter password:
	{{ form.password2 }}
	<br>
	gender: 
	{{ form.gender }}
	<br>
        <button type="submit">Sign Up</button>
    </form>

    <p>Already have an account? <a href="{% url 'login' %}">Log in</a></p>
</body>
</html>
