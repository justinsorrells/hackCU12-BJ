{% extends "base.html" %}

{% block title %}Create Hike | PeakPals{% endblock %}

{% block content %}
        <article class="form-card">
            <span class="eyebrow">Plan a hike</span>
            <h1 class="form-title">Create a new hiking event</h1>

            <form method="post" enctype="multipart/form-data" class="form-layout">
                {% csrf_token %}
                {% include "partials/form_fields.html" with form=form %}
                <div class="button-row">
                    <button class="btn btn-primary" type="submit">Create event</button>
                    <a class="btn btn-outline" href="{% url 'home' %}">Cancel</a>
                </div>
            </form>
        </article>

{% endblock %}
